<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>webe.media – Christi Himmelfahrt 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }

  .post {
    width: 800px;
    height: 1000px;
    position: relative;
    overflow: hidden;
    background: #020a11;
    flex-shrink: 0;
  }

  .bg-noise {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    z-index: 1;
  }

  .glow-yellow {
    position: absolute;
    top: -160px;
    right: -180px;
    width: 640px;
    height: 640px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(194,209,8,0.18) 0%, transparent 65%);
    z-index: 1;
  }

  .glow-blue {
    position: absolute;
    bottom: -120px;
    left: -140px;
    width: 520px;
    height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(194,209,8,0.07) 0%, transparent 70%);
    z-index: 1;
  }

  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(194,209,8,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(194,209,8,0.04) 1px, transparent 1px);
    background-size: 100px 100px;
    z-index: 2;
  }

  .center-block {
    position: absolute;
    top: 50%;
    left: 60px;
    transform: translateY(-62%);
    z-index: 10;
    max-width: 520px;
  }

  .cb-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #c2d108;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cb-label::before {
    content: '';
    width: 28px;
    height: 1px;
    background: #c2d108;
  }

  .cb-text {
    font-size: 17px;
    font-weight: 300;
    line-height: 1.65;
    color: rgba(255,255,255,0.5);
    max-width: 380px;
  }

  .cb-text strong {
    color: #fff;
    font-weight: 500;
  }

  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0 60px 58px;
    z-index: 20;
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 18px;
  }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 128px;
    line-height: 0.88;
    color: #fff;
  }

  .headline .accent {
    color: #c2d108;
  }

  .subline {
    font-size: 13px;
    font-weight: 300;
    color: rgba(255,255,255,0.4);
    line-height: 1.75;
    max-width: 380px;
    margin-bottom: 42px;
  }

  .bottom-row {
    display: flex;
    justify-content: space-between;
  }

  .handle {
    font-size: 11px;
    color: rgba(255,255,255,0.22);
  }

  .handle strong {
    color: rgba(255,255,255,0.55);
  }

  .badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border: 1px solid rgba(194,209,8,0.3);
    border-radius: 100px;
    background: rgba(194,209,8,0.06);
  }

  .badge-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #c2d108;
    animation: blink 2.5s infinite;
  }

  @keyframes blink {
    50% { opacity: 0.25; }
  }

  .badge-text {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(194,209,8,0.7);
  }

</style>
</head>

<body>
<div class="post">

  <div class="bg-noise"></div>
  <div class="glow-yellow"></div>
  <div class="glow-blue"></div>
  <div class="grid"></div>

  <div class="center-block">
    <div class="cb-label">Christi Himmelfahrt</div>
    <div class="cb-text">
      Manchmal ist der beste Move,<br>
      <strong>einfach durchzuatmen.</strong><br>
      Heute gönnen wir uns genau das.
    </div>
  </div>

  <div class="content">
    <div class="eyebrow">Schönen Feiertag</div>
    <div class="headline">
      Hoch<br><span class="accent">hinaus.</span>
    </div>
    <div class="subline">
      Wir wünschen euch einen erholsamen Feiertag —<br>
      ab Montag sind wir wieder voll für Sie da.
    </div>

    <div class="bottom-row">
      <div class="handle"><strong>@webe_media</strong> · webe.media</div>
      <div class="badge">
        <div class="badge-dot"></div>
        <div class="badge-text">Feiertag</div>
      </div>
    </div>

  </div>

</div>
</body>
</html>
